name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            use_zig: true
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            use_zig: true
          - target: x86_64-apple-darwin
            runner: macos-13
            use_zig: false
          - target: aarch64-apple-darwin
            runner: macos-14
            use_zig: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Setup Zig
        if: matrix.use_zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.14.1
      - name: Install cargo-zigbuild
        if: matrix.use_zig
        uses: taiki-e/install-action@cargo-zigbuild
      - name: Build release binary
        run: |
          if [ "${{ matrix.use_zig }}" = "true" ]; then
            cargo zigbuild --release --locked --bin loom --target ${{ matrix.target }}
          else
            cargo build --release --locked --bin loom --target ${{ matrix.target }}
          fi
      - name: Package archive
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/loom dist/loom
          cp README.md LICENSE dist/
          tar -C dist -czf loom-${{ matrix.target }}.tar.gz loom README.md LICENSE
      - uses: actions/upload-artifact@v4
        with:
          name: loom-${{ matrix.target }}
          path: loom-${{ matrix.target }}.tar.gz

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: loom-*
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz > loom-checksums.txt
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/loom-checksums.txt
